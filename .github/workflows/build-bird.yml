name: Build latest BIRD

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
  contents: write

jobs:
  detect:
    name: Detect latest BIRD 3 version
    runs-on: ubuntu-24.04

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      source_url: ${{ steps.version.outputs.source_url }}
      release_exists: ${{ steps.release_check.outputs.exists }}

    steps:
      - name: Detect latest BIRD 3 version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PAGE_URL="https://bird.nic.cz/get-bird/"
          DOWNLOAD_BASE_URL="https://bird.nic.cz/download"

          html="$(curl -fsSL "$PAGE_URL")"

          version="$(printf '%s\n' "$html" \
            | grep -oE 'bird-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz|BIRD 3\.[0-9]+\.[0-9]+' \
            | sed -E 's/bird-//; s/\.tar\.gz//; s/BIRD //' \
            | grep -E '^3\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)"

          if [ -z "$version" ]; then
            echo "Failed to detect latest BIRD 3 version"
            exit 1
          fi

          source_url="${DOWNLOAD_BASE_URL}/bird-${version}.tar.gz"

          echo "Latest BIRD version: $version"
          echo "Source URL: $source_url"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=bird-v$version" >> "$GITHUB_OUTPUT"
          echo "source_url=$source_url" >> "$GITHUB_OUTPUT"

      - name: Check release exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skip build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist, continue build."
          fi

  build:
    name: Build BIRD ${{ matrix.artifact_name }}
    needs: detect
    if: needs.detect.outputs.release_exists == 'false'

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: linux-amd64
            target: linux/amd64
            docker_platform: linux/amd64

          - artifact_name: linux-arm64
            target: linux/arm64
            docker_platform: linux/arm64

    runs-on: ubuntu-24.04

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build BIRD with Docker
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.detect.outputs.version }}"
          SOURCE_URL="${{ needs.detect.outputs.source_url }}"
          ARTIFACT_NAME="${{ matrix.artifact_name }}"
          DOCKER_PLATFORM="${{ matrix.docker_platform }}"

          mkdir -p "out-${ARTIFACT_NAME}"

          docker run --rm \
            --platform "$DOCKER_PLATFORM" \
            -v "$PWD/out-${ARTIFACT_NAME}:/out" \
            debian:12 \
            bash -lc "
              set -euo pipefail

              apt-get update
              apt-get install -y \
                ca-certificates \
                curl \
                build-essential \
                flex \
                bison \
                m4 \
                autoconf \
                automake \
                libtool \
                pkg-config \
                libreadline-dev \
                libncurses-dev \
                zlib1g-dev

              curl -fL -o \"bird-${VERSION}.tar.gz\" \"${SOURCE_URL}\"
              tar -xf \"bird-${VERSION}.tar.gz\"

              cd \"bird-${VERSION}\"

              ./configure \
                --prefix=/opt/bird \
                --sbindir=/opt/bird \
                --sysconfdir=/etc/bird \
                --localstatedir=/var \
                --runstatedir=/run/bird \
                --with-protocols=all

              make -j\"\$(nproc)\"

              ./bird --version || true
              ./birdcl --version || true
              ./birdc --version || true

              mkdir -p /out

              cp bird /out/bird
              cp birdcl /out/birdcl
              cp birdc /out/birdc || true

              cp bird.conf.example /out/bird.conf.example 2>/dev/null || true
              cp README* /out/ 2>/dev/null || true
              cp NEWS* /out/ 2>/dev/null || true
              cp COPYING* /out/ 2>/dev/null || true

              ldd /out/bird > /out/ldd-bird.txt || true
              ldd /out/birdcl > /out/ldd-birdcl.txt || true
            "

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          NAME="bird"
          VERSION="${{ needs.detect.outputs.version }}"
          SOURCE_URL="${{ needs.detect.outputs.source_url }}"
          ARTIFACT_NAME="${{ matrix.artifact_name }}"
          TARGET="${{ matrix.target }}"
          BUILD="ubuntu-24.04"
          PACKAGE_NAME="bird-${VERSION}-${ARTIFACT_NAME}"
          BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p "$PACKAGE_NAME"

          cp "out-${ARTIFACT_NAME}/bird" "$PACKAGE_NAME/bird"
          cp "out-${ARTIFACT_NAME}/birdcl" "$PACKAGE_NAME/birdcl"
          cp "out-${ARTIFACT_NAME}/birdc" "$PACKAGE_NAME/birdc" || true
          cp "out-${ARTIFACT_NAME}/bird.conf.example" "$PACKAGE_NAME/bird.conf.example" || true
          cp "out-${ARTIFACT_NAME}/ldd-bird.txt" "$PACKAGE_NAME/ldd-bird.txt" || true
          cp "out-${ARTIFACT_NAME}/ldd-birdcl.txt" "$PACKAGE_NAME/ldd-birdcl.txt" || true
          cp "out-${ARTIFACT_NAME}"/README* "$PACKAGE_NAME/" 2>/dev/null || true
          cp "out-${ARTIFACT_NAME}"/NEWS* "$PACKAGE_NAME/" 2>/dev/null || true
          cp "out-${ARTIFACT_NAME}"/COPYING* "$PACKAGE_NAME/" 2>/dev/null || true

          chmod +x "$PACKAGE_NAME/bird" || true
          chmod +x "$PACKAGE_NAME/birdcl" || true
          chmod +x "$PACKAGE_NAME/birdc" || true

          cat > "$PACKAGE_NAME/bird.service" <<EOF
          [Unit]
          Description=BIRD Internet Routing Daemon
          Documentation=https://bird.nic.cz/
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          RuntimeDirectory=bird
          RuntimeDirectoryMode=0755
          ExecStart=/opt/bird/bird -f -c /opt/bird/bird.conf -s /run/bird/bird.ctl
          ExecReload=/opt/bird/birdc -s /run/bird/bird.ctl configure
          Restart=on-failure
          RestartSec=3
          CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_RAW CAP_NET_BIND_SERVICE
          AmbientCapabilities=CAP_NET_ADMIN CAP_NET_RAW CAP_NET_BIND_SERVICE
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
          EOF

          cat > "$PACKAGE_NAME/manifest.json" <<EOF
          {
            "name": "${NAME}",
            "version": "${VERSION}",
            "target": "${TARGET}",
            "build": "${BUILD}",
            "artifact": "${ARTIFACT_NAME}",
            "source_url": "${SOURCE_URL}",
            "built_at": "${BUILT_AT}",
            "files": {
              "bird": "bird",
              "birdcl": "birdcl",
              "birdc": "birdc",
              "config_example": "bird.conf.example",
              "service": "bird.service"
            }
          }
          EOF

          cat > "$PACKAGE_NAME/README-RUNTIME.md" <<EOF
          # BIRD ${VERSION} runtime

          Built from official source:

          ${SOURCE_URL}

          ## Files

          - bird
          - birdcl
          - birdc
          - bird.conf.example
          - bird.service
          - manifest.json

          ## Install example

          \`\`\`bash
          sudo mkdir -p /opt/bird
          sudo cp bird birdcl birdc bird.conf.example /opt/bird/
          sudo cp bird.service /etc/systemd/system/bird.service

          sudo cp /opt/bird/bird.conf.example /opt/bird/bird.conf
          sudo chmod +x /opt/bird/bird /opt/bird/birdcl /opt/bird/birdc

          sudo systemctl daemon-reload
          sudo systemctl enable bird
          sudo systemctl start bird
          \`\`\`

          ## Check

          \`\`\`bash
          /opt/bird/bird --version
          /opt/bird/birdcl --version
          systemctl status bird
          \`\`\`
          EOF

          tar -czf "${PACKAGE_NAME}.tar.gz" "$PACKAGE_NAME"
          sha256sum "${PACKAGE_NAME}.tar.gz" > "${PACKAGE_NAME}.tar.gz.sha256"

      - name: Check package files
        shell: bash
        run: |
          ls -lh *.tar.gz *.sha256

      - name: Upload artifact to Actions
        uses: actions/upload-artifact@v4
        timeout-minutes: 10
        with:
          name: bird-${{ needs.detect.outputs.version }}-${{ matrix.artifact_name }}
          path: |
            bird-${{ needs.detect.outputs.version }}-${{ matrix.artifact_name }}.tar.gz
            bird-${{ needs.detect.outputs.version }}-${{ matrix.artifact_name }}.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release:
    name: Create GitHub Release
    needs:
      - detect
      - build
    if: needs.detect.outputs.release_exists == 'false'
    runs-on: ubuntu-24.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        timeout-minutes: 10
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          find release-assets -type f -maxdepth 2 -print
          ls -lh release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.detect.outputs.version }}"
          TAG="${{ needs.detect.outputs.tag }}"
          SOURCE_URL="${{ needs.detect.outputs.source_url }}"

          gh release create "$TAG" \
            release-assets/* \
            --repo "$GH_REPO" \
            --title "BIRD ${VERSION}" \
            --notes "Auto-built BIRD ${VERSION} from official source: ${SOURCE_URL}"
